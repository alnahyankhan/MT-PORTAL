        const createIcon = (name) => ({ size = 24, className = '' }) => {
          const iconRef = useRef(null);
          
          useEffect(() => {
            if (iconRef.current && window.lucide) {
              iconRef.current.innerHTML = ''; // Clear for re-renders
              const i = document.createElement('i');
              i.setAttribute('data-lucide', name);
              iconRef.current.appendChild(i);
              
              window.lucide.createIcons({
                root: iconRef.current,
                attrs: { width: size, height: size }
              });
            }
          }, [size]); // className applies to the parent span, no need to recreate SVG
          
          return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;

          const abs = Math.abs(num);
          if (abs >= 10000000) return `${sign}\u09f3${(abs / 10000000).toFixed(1)}Cr`;
          if (abs >= 100000) return `${sign}\u09f3${(abs / 100000).toFixed(1)}L`;

        const DonutChart = ({ data, valueFormatter = formatCompactCurrency }) => {
          const total = data.reduce((sum, item) => sum + Math.max(0, Number(item.value) || 0), 0);
          if (total === 0) return <ChartEmpty />;

          let currentOffset = 0;
          const radius = 35;
          const circumference = 2 * Math.PI * radius;

          return (
            <div className="flex items-center justify-center gap-8 mt-4 h-56">
              <div className="relative w-44 h-44 shrink-0">
                <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90 drop-shadow-md">
                  {data.map((item) => {
                    const value = Math.max(0, Number(item.value) || 0);
                    const percentage = value / total;
                    const strokeLength = percentage * circumference;
                    const dashArray = `${strokeLength} ${circumference}`;
                    const offset = -currentOffset;
                    currentOffset += strokeLength;

                    return (
                      <circle
                        key={item.label}
                        cx="50"
                        cy="50"
                        r={radius}
                        fill="transparent"
                        stroke={item.color || "#ccc"}
                        strokeWidth="16"
                        strokeDasharray={dashArray}
                        strokeDashoffset={offset}
                        className="transition-all duration-1000 ease-out hover:opacity-80 cursor-pointer"
                      />
                    );

          };

          const safeDate = (d) => {
            if (!d) return '';
            let dObj = new Date(d);
            
            if (isNaN(dObj.getTime())) {
              const normalizedString = String(d).replace(/\//g, '-').replace(/\s+/g, '-');
              const parts = normalizedString.split('-');
              
              if (parts.length >= 3) {
                const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
                const monthIndex = months[parts[1].substring(0,3)];
                
                if (monthIndex !== undefined) {
                   dObj = new Date(parts[2], monthIndex, parts[0]);
                } else if (!isNaN(parts[1])) {
                   dObj = new Date(parts[2], parts[1]-1, parts[0]);
                }
              }
            }
            if (isNaN(dObj.getTime())) return '';
            
            const year = dObj.getFullYear();
            // Accept all historical data (fixes bug where older years were dropped)
            if (year < 2000) return ''; 

            const month = String(dObj.getMonth() + 1).padStart(2, '0');
            const day = String(dObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`; 
          };

          const getDayName = (dateString) => {
            if (!dateString) return '';
            const d = new Date(dateString);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleDateString('en-US', { weekday: 'long' });
          };

          const safeNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            // Force absolute value so expenses entered as negative don't get double-added
            if (typeof val === 'number') return Math.abs(val);
            const parsed = parseFloat(String(val).replace(/[^0-9.-]+/g, ""));
            return isNaN(parsed) ? 0 : Math.abs(parsed);
          };

          const pickFirst = (row, keys) => {
            for (const key of keys) {
              if (row && row[key] !== undefined && row[key] !== null && row[key] !== '') return row[key];
            }
            return '';
          };

          const fetchData = async () => {
            setIsLoading(true);
            setConnectionError(false);
            setIsSimulationMode(false);
            try {
              const response = await fetch(`${GOOGLE_APP_SCRIPT_URL}?t=${Date.now()}`);
              if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
              const data = await response.json();
              
              setBookings((data.bookings || []).map((b, idx) => {
                const rawDate = pickFirst(b, ['Date', 'date', 'DATE']);
                const normalizedDate = safeDate(rawDate);
                return {
                  id: pickFirst(b, ['S/N', 'SN', 'ID', 'id']) || `b-${idx}-${Date.now()}`,
                  date: normalizedDate,
                  day: pickFirst(b, ['Day', 'day']) || getDayName(normalizedDate),
                  matches: safeNumber(pickFirst(b, ['No of Match', 'Match No', 'Matches', 'Match', 'matches', 'match'])) || 0,
                  amount: safeNumber(pickFirst(b, ['Income (BDT)', 'Income', 'Revenue', 'Sales', 'Amount', 'Taka', 'amount']))
                };
              }));

              setExpenses((data.expenses || []).map((e, idx) => {
                const rawDate = pickFirst(e, ['Date', 'date', 'DATE']);
                const normalizedDate = safeDate(rawDate);
                return {
                  id: `e-${idx}-${Date.now()}`,
                  date: normalizedDate,
                  day: pickFirst(e, ['Day', 'day']) || getDayName(normalizedDate),
                  description: pickFirst(e, ['Description', 'Particulars', 'Note', 'Notes', 'Details']) || '',
                  amount: safeNumber(pickFirst(e, ['Amount', 'Taka', 'Cost', 'Expense', 'Expenses', 'amount']))
                };
              }));

              setInventory((data.inventory || data['Inventory / Asset'] || []).map((i, idx) => {
                const rawDate = pickFirst(i, ['Date', 'date', 'DATE']);
                const normalizedDate = safeDate(rawDate);
                return {
                  id: `i-${idx}-${Date.now()}`,
                  date: normalizedDate,
                  day: pickFirst(i, ['Day', 'day']) || getDayName(normalizedDate),
                  description: pickFirst(i, ['Description', 'Particulars', 'Note', 'Notes', 'Details']) || '',
                  amount: safeNumber(pickFirst(i, ['Amount', 'Taka', 'Cost', 'Asset', 'Inventory', 'amount']))
                };
              }));

              setCredentials((data.credentials || data['ID&PASSWORD'] || []).map(c => ({
                username: String(c['Username'] || c['username'] || '').trim(),
                password: String(c['Password'] || c['password'] || '').trim()
              })));
              
              showNotification("System: Turf data synced successfully.", "success", 3000);

            } catch (error) {
              setConnectionError(true);
            } finally {
              setIsLoading(false);
            }
          };

          const loadSimulationMode = () => {
            setConnectionError(false);
            setIsSimulationMode(true);
            setBookings(mockBookings.map(b => ({...b, date: safeDate(b.date)})));
            setExpenses(mockExpenses.map(e => ({...e, date: safeDate(e.date)})));
            setInventory(mockInventory.map(i => ({...i, date: safeDate(i.date)})));
            setCredentials([{username: 'admin', password: 'password'}]);
            showNotification("System: Running in Demo Mode.", "info");
          };

          useEffect(() => { 
            fetchData(); 
            const handleOnline = () => { setIsOnline(true); if(!isSimulationMode) fetchData(); };
            const handleOffline = () => setIsOnline(false);
            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', handleOffline);
            return () => {
              window.removeEventListener('online', handleOnline);
              window.removeEventListener('offline', handleOffline);
            };
          }, []);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const handleSubmit = async (e) => {
            e.preventDefault();
            setIsSaving(true);
            
            const newEntry = {
              id: Date.now(), 
              date: formData.date,
              day: getDayName(formData.date),
              amount: parseFloat(formData.amount) || 0,
              type: entryType
            };

            if (entryType === 'booking') newEntry.matches = parseInt(formData.matches) || 1;
            else newEntry.description = formData.description;

            try {
              if (!isSimulationMode) {
                await fetch(GOOGLE_APP_SCRIPT_URL, { method: 'POST', body: JSON.stringify(newEntry) });
              }
              
              if (entryType === 'booking') setBookings([...bookings, newEntry]);
              else if (entryType === 'expense') setExpenses([...expenses, newEntry]);
              else setInventory([...inventory, newEntry]);

              setFormData(prev => ({ ...prev, amount: entryType === 'booking' ? 2000 : '', description: '', matches: 1 }));
              showNotification(`System: Playbook updated${isSimulationMode ? ' (Local Cache Only)' : ''}.`, "success", 4000);
            } catch (error) {
              showNotification('System Error: Failed to commit data to database.', 'error');
            } finally {
              setIsSaving(false);
            }
          };

          const handleApplyFilters = () => setAppliedFilters(localFilters);
          const handleClearFilters = () => {
            setLocalFilters(defaultFilters);
            setAppliedFilters(defaultFilters);
          };

          const filteredData = useMemo(() => {
            const apply = (data) => {
              return data.filter(item => {
                if (!item.date || item.date.length !== 10) return false; 
                let isValid = true;
                if (appliedFilters.startDate && item.date < appliedFilters.startDate) isValid = false;
                if (appliedFilters.endDate && item.date > appliedFilters.endDate) isValid = false;
                if (appliedFilters.dayOfWeek !== 'All' && item.day !== appliedFilters.dayOfWeek) isValid = false;
                return isValid;
              });
            };
            return {
              bookings: apply(bookings),
              expenses: apply(expenses),
              inventory: apply(inventory)
            };
          }, [bookings, expenses, inventory, appliedFilters]);

          const prevBalance = useMemo(() => {
            if (!appliedFilters.startDate) return 0;
            const beforeStart = (data) => data.filter(d => 
              d.date && 
              d.date.length === 10 && 
              d.date < appliedFilters.startDate
            );
            const rev = beforeStart(bookings).reduce((sum, b) => sum + b.amount, 0);
            const exp = beforeStart(expenses).reduce((sum, e) => sum + e.amount, 0);
            const inv = beforeStart(inventory).reduce((sum, i) => sum + i.amount, 0);
            return rev - exp - inv;
          }, [bookings, expenses, inventory, appliedFilters.startDate]);

          const stats = useMemo(() => {
            const totalMatches = filteredData.bookings.reduce((sum, b) => sum + b.matches, 0);
            const totalRevenue = filteredData.bookings.reduce((sum, b) => sum + b.amount, 0);
            const totalExpenses = filteredData.expenses.reduce((sum, b) => sum + b.amount, 0);
            const totalAsset = filteredData.inventory.reduce((sum, b) => sum + b.amount, 0);
            
            const allDates = [...filteredData.bookings.map(b=>b.date), ...filteredData.expenses.map(e=>e.date), ...filteredData.inventory.map(i=>i.date)].sort();
            const minDate = allDates.length > 0 ? allDates[0] : 'N/A';
            const maxDate = allDates.length > 0 ? allDates[allDates.length - 1] : 'N/A';

            const uniqueBookingDays = new Set(filteredData.bookings.map(b => b.date)).size;
            
            // Correct Accounting: Assets do NOT reduce Net Profit, they only reduce Cash (Treasury)
            const netProfit = totalRevenue - totalExpenses;
            const netCashFlow = netProfit - totalAsset;
            const currentBalance = prevBalance + netCashFlow;

            return {
              startDate: appliedFilters.startDate || minDate,
              endDate: appliedFilters.endDate || maxDate,
              totalMatches,
              totalRevenue,
              totalExpenses,
              totalAsset,
              prevBalance, 
              currentBalance,
              netProfit,
              netCashFlow,
              avgMatchPerDay: uniqueBookingDays ? (totalMatches / uniqueBookingDays).toFixed(2) : 0,
              avgRevPerDay: uniqueBookingDays ? (totalRevenue / uniqueBookingDays).toFixed(2) : 0,
              pctAsset: totalRevenue ? ((totalAsset / totalRevenue) * 100).toFixed(2) : 0,
              pctExpense: totalRevenue ? ((totalExpenses / totalRevenue) * 100).toFixed(2) : 0,
              pctProfit: totalRevenue ? ((netProfit / totalRevenue) * 100).toFixed(2) : 0,
            };
          }, [filteredData, appliedFilters, prevBalance]);

          const aggregatedChartData = useMemo(() => {
            const dailyMap = {};
            const addToMap = (date, type, amount) => {
              if (!dailyMap[date]) dailyMap[date] = { date, income: 0, expense: 0, inventory: 0 };
              dailyMap[date][type] += amount;
            };
            filteredData.bookings.forEach(b => addToMap(b.date, 'income', b.amount));
            filteredData.expenses.forEach(e => addToMap(e.date, 'expense', e.amount));
            filteredData.inventory.forEach(i => addToMap(i.date, 'inventory', i.amount));
            return Object.values(dailyMap).sort((a, b) => new Date(a.date) - new Date(b.date));
          }, [filteredData]);


          const financialSplitData = useMemo(() => ([
            {
              label: 'Revenue',
              value: stats.totalRevenue,
              color: '#10b981', // emerald-500
              barClass: 'bg-emerald-500',
              textClass: 'text-emerald-400'
            },
            {
              label: 'Expenses',
              value: stats.totalExpenses,
              color: '#ef4444', // red-500
              barClass: 'bg-red-500',
              textClass: 'text-red-400'
            },
            {
              label: 'Inventory',
              value: stats.totalAsset,
              color: '#3b82f6', // blue-500
              barClass: 'bg-blue-500',
              textClass: 'text-blue-400'
            }
          ]), [stats.totalRevenue, stats.totalExpenses, stats.totalAsset]);

          const monthlyFinancialData = useMemo(() => {
            const monthlyMap = {};
            const ensureMonth = (date) => {
              if (!date || date.length < 7) return null;
              const month = date.substring(0, 7);
              if (!monthlyMap[month]) {
                monthlyMap[month] = {
                  month,
                  label: formatMonthLabel(date),
                  revenue: 0,
                  expenses: 0,
                  inventory: 0,
                  matches: 0
                };
              }
              return monthlyMap[month];
            };

            filteredData.bookings.forEach((b) => {
              const row = ensureMonth(b.date);
              if (!row) return;
              row.revenue += b.amount;
              row.matches += b.matches;
            });

            filteredData.expenses.forEach((e) => {
              const row = ensureMonth(e.date);
              if (!row) return;
              row.expenses += e.amount;
            });

            filteredData.inventory.forEach((i) => {
              const row = ensureMonth(i.date);
              if (!row) return;
              row.inventory += i.amount;
            });

            const sortedMonths = Object.values(monthlyMap).sort((a, b) => a.month.localeCompare(b.month));

            // Run a rolling calculation through the months for the chart
            let currentRollingBalance = prevBalance;

            return sortedMonths.map((row) => {
              const netProfit = row.revenue - row.expenses;
              const netCashFlow = netProfit - row.inventory;
              const openingBalance = currentRollingBalance;
              const closingBalance = openingBalance + netCashFlow;
              
              currentRollingBalance = closingBalance;

              return {
                ...row,
                netProfit,
                netCashFlow,
                openingBalance,
                closingBalance,
                sales: row.revenue
              };
            });
          }, [filteredData, prevBalance]);

          const monthlySalesData = useMemo(() => {
            const maxSales = Math.max(0, ...monthlyFinancialData.map((row) => row.sales));
            return monthlyFinancialData.map((row) => ({
              ...row,
              label: row.label,
              isMax: maxSales > 0 && row.sales === maxSales
            }));
          }, [monthlyFinancialData]);

          const monthlyMatchesData = useMemo(() => {
            return monthlyFinancialData.map((row) => ({
              label: row.label,
              fullLabel: `Matches in ${row.label}`,
              matches: row.matches,
              barClass: 'bg-blue-500',
              textClass: 'text-blue-400'
            }));
          }, [monthlyFinancialData]);

          // STYLES UPDATE
          const themeCard = "bg-slate-900 rounded-xl p-5 border border-slate-800 shadow-md flex flex-col justify-between hover:border-emerald-500/30 transition-all relative overflow-hidden group h-full";
          const themeInput = "w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors";
          const themeLabel = "block text-[11px] font-bold text-slate-400 mb-1.5 tracking-widest uppercase truncate";

          const KPICard = ({ title, value, icon: Icon, colorClass, highlight }) => (
            <div className={`${themeCard} ${highlight ? 'border-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : ''}`}>
              <div className="flex justify-between items-center relative z-10 gap-2">
                <div className="flex-1 min-w-0">
                  <p className={`${themeLabel} ${highlight ? 'text-emerald-400' : ''}`} title={title}>{title}</p>
                  <h3 className={`text-base sm:text-lg font-bold whitespace-nowrap tracking-tight truncate ${colorClass}`} title={value}>{value}</h3>
                </div>
                <div className={`p-2 shrink-0 rounded-lg border ${highlight ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>
                  {Icon && <Icon size={20} />}
                </div>
              </div>
            </div>
          );

          const handleLogin = (e) => {
            e.preventDefault();
            const validUser = credentials.find(c => c.username === loginForm.username && c.password === loginForm.password);
            if (validUser) {
              setIsAuthenticated(true);
              showNotification("System: Turf access granted.", "success", 3000);
            } else {
              showNotification("System: Access Denied. Invalid credentials.", "error", 3000);
            }
          };

          const handleLogout = () => {
            setIsAuthenticated(false);
            setLoginForm({ username: '', password: '' });
            showNotification("System: Logged out of Turf Manager.", "info", 3000);
          };

          if ((!isOnline || connectionError) && !isSimulationMode) {
            return (
              <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-slate-300 font-sans relative overflow-hidden px-4">
                <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none"></div>
                {AlertTriangle && <AlertTriangle size={80} className="text-red-500 mb-6 animate-pulse" />}
                <h1 className="text-3xl font-black text-white tracking-widest uppercase mb-3 flex items-center gap-3">
                  {Activity && <Activity className="text-emerald-500" />} System Offline
                </h1>
                <p className="text-slate-400 mb-8 font-medium tracking-wide text-center max-w-md relative z-10">
                  Turf Manager unreachable. Connection to database was blocked by network policies.
                </p>
                
                <div className="flex flex-col sm:flex-row gap-4 relative z-10 w-full max-w-md">
                  <button 
                    onClick={() => { setIsOnline(navigator.onLine); setConnectionError(false); fetchData(); }} 
                    className="flex-1 px-4 py-4 bg-slate-800 text-white border border-slate-700 hover:bg-slate-700 rounded-lg transition-colors font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2 shadow-sm"
                  >
                    {RefreshCw && <RefreshCw size={16} className={isLoading ? "animate-spin" : ""} />} Retry Live
                  </button>
                  <button 
                    onClick={loadSimulationMode} 
                    className="flex-1 px-4 py-4 bg-emerald-600 text-white hover:bg-emerald-500 rounded-lg transition-colors font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2 shadow-md shadow-emerald-900"
                  >
                    {Database && <Database size={16} />} Enter Demo Mode
                  </button>
                </div>
              </div>
            );
          }

          if (!isAuthenticated) {
            return (
              <div className="min-h-screen bg-slate-950 flex items-center justify-center text-slate-300 font-sans relative overflow-hidden px-4">
                {notification.show && (
                  <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 animate-in slide-in-from-top-10 fade-in w-full max-w-lg px-4">
                    <div className={`p-4 rounded-xl border flex items-start gap-3 shadow-2xl backdrop-blur-md ${notification.type === 'error' ? 'bg-red-950/90 border-red-500/50 text-red-200' : 'bg-emerald-950/90 border-emerald-500/50 text-emerald-200'}`}>
                      {notification.type === 'error' ? (AlertTriangle ? <AlertTriangle className="text-red-500 shrink-0 mt-0.5" /> : null) : (CheckCircle2 ? <CheckCircle2 className="text-emerald-400 shrink-0 mt-0.5" /> : null)}
                      <div className="flex-1"><p className="font-bold tracking-wide text-sm leading-relaxed">{notification.message}</p></div>
                      <button onClick={() => setNotification({show: false, message: '', type: 'info'})} className="opacity-50 hover:opacity-100">
                        {X && <X size={16} />}
                      </button>
                    </div>
                  </div>
                )}
                <div className="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-emerald-600/10 rounded-full blur-[120px] pointer-events-none"></div>
                <div className="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>
                
                <div className="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl relative z-10 w-full max-w-md">
                  <div className="flex justify-center mb-6">
                     <div className="w-20 h-20 rounded-full bg-slate-950 border-4 border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.3)] flex items-center justify-center">
                       {Trophy && <Trophy className="text-emerald-400" size={32} />}
                     </div>
                  </div>
                  <div className="text-center mb-8">
                    <h2 className="text-2xl font-black text-white tracking-widest uppercase">
                      <span className="text-emerald-500">Mohakash</span> Turf
                    </h2>
                    <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Manager Portal</p>
                  </div>
                  
                  <form onSubmit={handleLogin} className="space-y-6">
                    <div>
                      <label className={themeLabel}>Username</label>
                      <div className="relative">
                        {User && <User className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" size={18} />}
                        <input 
                          type="text" 
                          required 
                          className={`${themeInput} pl-10`}
                          value={loginForm.username}
                          onChange={(e) => setLoginForm({...loginForm, username: e.target.value})}
                        />
                      </div>
                    </div>
                    <div>
                      <label className={themeLabel}>Password</label>
                      <div className="relative">
                        {Lock && <Lock className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" size={18} />}
                        <input 
                          type={showPassword ? "text" : "password"} 
                          required 
                          className={`${themeInput} pl-10 pr-10`}
                          value={loginForm.password}
                          onChange={(e) => setLoginForm({...loginForm, password: e.target.value})}
                        />
                        <button 
                          type="button"
                          onClick={() => setShowPassword(!showPassword)}
                          className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-emerald-400 transition-colors focus:outline-none"
                          title={showPassword ? "Hide Password" : "Show Password"}
                        >
                          {showPassword ? (EyeOff ? <EyeOff size={18} /> : null) : (Eye ? <Eye size={18} /> : null)}
                        </button>
                      </div>
                    </div>
                    <button 
                      type="submit" 
                      disabled={isLoading}
                      className={`w-full py-4 font-bold tracking-widest uppercase rounded-lg flex justify-center items-center gap-2 transition-all hover:scale-[1.01] shadow-lg ${isLoading ? 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700' : 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-emerald-900/50'}`}
                    >
                      {isLoading ? (Loader2 ? <Loader2 className="animate-spin" size={18} /> : null) : (Zap ? <Zap size={18} /> : null)}
                      {isLoading ? 'LOADING DATA...' : 'Enter Dashboard'}
                    </button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-950 flex font-sans text-slate-200">
              
              {notification.show && (
                <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 animate-in slide-in-from-top-10 fade-in w-full max-w-lg px-4">
                  <div className={`p-4 rounded-xl border flex items-start gap-3 shadow-2xl backdrop-blur-md ${notification.type === 'error' ? 'bg-red-950/90 border-red-500/50 text-red-200' : 'bg-emerald-950/90 border-emerald-500/50 text-emerald-200'}`}>
                    {notification.type === 'error' ? (AlertTriangle ? <AlertTriangle className="text-red-500 shrink-0 mt-0.5" /> : null) : (CheckCircle2 ? <CheckCircle2 className="text-emerald-400 shrink-0 mt-0.5" /> : null)}
                    <div className="flex-1"><p className="font-bold tracking-wide text-sm leading-relaxed">{notification.message}</p></div>
                    <button onClick={() => setNotification({show: false, message: '', type: 'info'})} className="opacity-50 hover:opacity-100">
                      {X && <X size={16} />}
                    </button>
                  </div>
                </div>
              )}

              {sidebarOpen && <div className="fixed inset-0 bg-black/80 z-20 md:hidden backdrop-blur-sm" onClick={() => setSidebarOpen(false)} />}

              <aside className={`fixed md:sticky top-0 left-0 z-30 h-screen w-64 bg-slate-900 border-r border-slate-800 transition-transform transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 flex flex-col`}>
                <div className="p-6 flex justify-between items-center border-b border-slate-800 relative overflow-hidden shrink-0">
                  <h1 className="text-xl font-black flex items-center gap-2 text-white relative z-10 tracking-widest uppercase">
                    {Activity && <Activity className="text-emerald-500" />}
                    M T<span className="text-emerald-500 font-light">PORTAL</span>
                  </h1>
                  <button className="md:hidden text-slate-400 hover:text-white" onClick={() => setSidebarOpen(false)}>
                    {X && <X size={20} />}
                  </button>
                </div>
                
                <nav className="p-4 space-y-2 flex-1 overflow-y-auto">
                  {[
                    { id: 'dashboard', icon: LayoutDashboard, label: 'Dashboard' },
                    { id: 'analytics', icon: FileText, label: 'Financials' },
                    { id: 'entry', icon: PlusCircle, label: 'Log Entry' },
                    { id: 'records', icon: List, label: 'Ledger' }
                  ].map(item => (
                    <button 
                      key={item.id}
                      onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }}
                      className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-lg transition-all tracking-wide uppercase text-xs font-bold
                        ${activeTab === item.id 
                          ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' 
                          : 'text-slate-400 border border-transparent hover:bg-slate-800 hover:text-white'}`}
                    >
                      {item.icon && <item.icon size={18} className={activeTab === item.id ? 'text-emerald-400' : ''} />}
                      {item.label}
                    </button>
                  ))}
                </nav>
              </aside>

              <main className="flex-1 w-full max-w-full overflow-hidden flex flex-col relative h-screen">
                <div className="absolute top-0 left-1/4 w-[800px] h-[400px] bg-emerald-500/5 rounded-full blur-[150px] pointer-events-none"></div>

                <header className="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 px-6 py-4 flex items-center justify-between sticky top-0 z-10 shrink-0">
                  <div className="flex items-center gap-4">
                    <button className="md:hidden text-slate-300" onClick={() => setSidebarOpen(true)}>
                      {Menu && <Menu size={24} />}
                    </button>
                    <h2 className="text-lg font-black text-white uppercase tracking-widest">{activeTab === 'entry' ? 'Log Entry' : activeTab.replace('_', ' ')}</h2>
                    {isLoading && Loader2 && <Loader2 className="animate-spin text-emerald-500" size={20} />}
                  </div>
                  <div className="flex items-center gap-4">
                    <button onClick={() => { if(!isSimulationMode) fetchData(); }} className={`text-slate-400 hover:text-white hidden sm:block ${isSimulationMode ? 'opacity-50 cursor-not-allowed' : ''}`}>
                      {RefreshCw && <RefreshCw size={18} className={isLoading ? "animate-spin" : ""} />}
                    </button>
                    <div className="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700">
                       {ShieldAlert && <ShieldAlert size={14} className={isSimulationMode ? "text-amber-500" : "text-emerald-500"} />}
                       <span className={`text-[10px] font-bold tracking-widest uppercase hidden sm:inline ${isSimulationMode ? 'text-amber-500' : 'text-emerald-500'}`}>
                         {isSimulationMode ? 'Demo Mode' : 'Online'}
                       </span>
                    </div>
                    <div className="w-px h-4 bg-slate-700 mx-1 hidden sm:block"></div>
                    <button onClick={handleLogout} className="text-slate-400 hover:text-red-400 flex items-center gap-1.5 transition-colors" title="Log Out">
                      {LogOut && <LogOut size={18} />}
                    </button>
                  </div>
                </header>

                <div className="p-4 md:p-8 overflow-y-auto flex-1 relative z-0">

                  {(activeTab === 'dashboard' || activeTab === 'analytics' || activeTab === 'records') && (
                    <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-sm mb-8 flex flex-col gap-4">
                      <div className="flex items-center gap-2 border-b border-slate-800 pb-3">
                        {Filter && <Filter size={16} className="text-emerald-500" />}
                        <h3 className="text-white font-bold uppercase text-xs tracking-widest">Filter Playbook</h3>
                      </div>
                      <div className="flex flex-wrap gap-4 items-end">
                        <div className="flex-1 min-w-[140px]">
                          <label className={themeLabel}>Start Date</label>
                          <input type="date" className={themeInput} value={localFilters.startDate} onChange={(e) => setLocalFilters({...localFilters, startDate: e.target.value})} />
                        </div>
                        <div className="flex-1 min-w-[140px]">
                          <label className={themeLabel}>End Date</label>
                          <input type="date" className={themeInput} value={localFilters.endDate} onChange={(e) => setLocalFilters({...localFilters, endDate: e.target.value})} />
                        </div>
                        <div className="flex-1 min-w-[140px]">
                          <label className={themeLabel}>Day</label>
                          <select className={themeInput} value={localFilters.dayOfWeek} onChange={(e) => setLocalFilters({...localFilters, dayOfWeek: e.target.value})}>
                            <option value="All">All Days</option>
                            {['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(day => <option key={day} value={day}>{day}</option>)}
                          </select>
                        </div>
                        <div className="flex gap-3 h-[46px] w-full sm:w-auto mt-2 sm:mt-0">
                          <button 
                            onClick={handleApplyFilters}
                            className="flex-1 sm:flex-none px-6 bg-emerald-600 text-white hover:bg-emerald-500 rounded-lg transition-colors font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2 shadow-sm"
                          >
                            {CheckCircle2 && <CheckCircle2 size={16}/>} Apply
                          </button>
                          <button 
                            onClick={handleClearFilters}
                            className="flex-1 sm:flex-none px-6 bg-slate-800 text-slate-300 border border-slate-700 hover:bg-slate-700 rounded-lg transition-colors font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2"
                          >
                            {X && <X size={16}/>} Clear
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {activeTab === 'dashboard' && (
                    <div className="space-y-8">
                      <div>
                         <div className="flex items-center gap-2 mb-4 pl-1 text-white">
                            {Trophy && <Trophy size={18} className="text-emerald-500" />}
                            <h3 className="font-bold uppercase text-sm tracking-widest">Field Metrics</h3>
                         </div>
                         <div className="flex flex-col gap-4">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                               <KPICard title="Total Revenue" value={formatCurrency(stats.totalRevenue)} icon={TrendingUp} colorClass="text-emerald-400" />
                               <KPICard title="Total Expenses" value={formatCurrency(stats.totalExpenses)} icon={TrendingDown} colorClass="text-red-400" />
                               <KPICard title="Assets / Inventory" value={formatCurrency(stats.totalAsset)} icon={Package} colorClass="text-blue-400" />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                               <KPICard title="Total Matches" value={stats.totalMatches} icon={Hash} colorClass="text-white" />
                               <KPICard title="Avg Matches / Day" value={stats.avgMatchPerDay} icon={Activity} colorClass="text-slate-300" />
                               <KPICard title="Avg Revenue / Day" value={formatCurrency(stats.avgRevPerDay)} icon={DollarSign} colorClass="text-emerald-400" />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                               <KPICard title="Opening Balance" value={formatCurrency(stats.prevBalance)} icon={History} colorClass="text-slate-400" />
                               <KPICard title="Current Treasury" value={formatCurrency(stats.currentBalance)} icon={Briefcase} colorClass="text-emerald-400" highlight={true} />
                               <KPICard title="Net Profit" value={formatCurrency(stats.netProfit)} icon={TrendingUp} colorClass={stats.netProfit >= 0 ? "text-emerald-400" : "text-red-400"} />
                            </div>
                         </div>
                      </div>

                      <div className="space-y-6">
                        <div className="flex items-center gap-2 mb-4 pl-1 text-white">
                          {LayoutDashboard && <LayoutDashboard size={18} className="text-emerald-500" />}
                          <h3 className="font-bold uppercase text-sm tracking-widest">Performance Visuals</h3>
                        </div>

                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                          <ChartShell title="Revenue vs Expenses & Assets" subtitle="Distribution of totals from all field ledgers.">
                            <DonutChart data={financialSplitData} valueFormatter={formatCurrency} />
                          </ChartShell>

                          <ChartShell title="Monthly Treasury Growth" subtitle="Revenue, Net Profit, and End-of-Month Closing Balance.">
                            <VerticalBarChart
                              data={monthlyFinancialData}
                              series={[
                                { key: 'revenue', label: 'Revenue', dotClass: 'bg-emerald-500', textClass: 'text-emerald-400', barClass: 'bg-emerald-500' },
                                { key: 'netProfit', label: 'Net Profit', dotClass: 'bg-white', textClass: 'text-slate-200', barClass: 'bg-slate-300' },
                                { key: 'closingBalance', label: 'Closing Balance', dotClass: 'bg-blue-400', textClass: 'text-blue-300', barClass: 'bg-blue-500' }
                              ]}
                              valueFormatter={formatCurrency}
                            />
                          </ChartShell>
                        </div>

                        <ChartShell title="Timeline Matrix" subtitle="Daily revenue, expense, and inventory overview.">
                          <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
                            <ChartLegend items={[
                              { label: 'Revenue', dotClass: 'bg-emerald-500', textClass: 'text-emerald-400' },
                              { label: 'Expense', dotClass: 'bg-red-500', textClass: 'text-red-400' },
                              { label: 'Asset', dotClass: 'bg-blue-500', textClass: 'text-blue-400' }
                            ]} />
                            <span className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">{aggregatedChartData.length} active date(s)</span>
                          </div>
                          <div className="pl-12 pb-4 pr-2">
                            <ActivityChart data={aggregatedChartData} />
                          </div>
                        </ChartShell>

                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                          <ChartShell title="Month vs Match Count" subtitle="Total matches played per month in the filtered range.">
                            <SingleValueBarChart 
                              data={monthlyMatchesData} 
                              valueKey="matches" 
                              valueFormatter={(value) => `${value}`} 
                            />
                          </ChartShell>

                          <ChartShell title="Top Monthly Sales" subtitle="Monthly sales leaderboards.">
                            <HorizontalBarChart
                              data={monthlySalesData}
                              valueKey="sales"
                              valueFormatter={formatCurrency}
                              getBarClass={(row) => row.isMax
                                ? 'bg-emerald-400'
                                : 'bg-slate-700'}
                              textClass="text-white"
                            />
                            {monthlySalesData.some((row) => row.isMax) && (
                              <div className="mt-5 rounded-lg border border-emerald-500/20 bg-emerald-500/10 p-4 text-xs font-medium text-emerald-300 flex items-center gap-3">
                                {Trophy && <Trophy size={20} className="text-emerald-400" />}
                                <p>
                                  Peak sales month is <span className="font-bold text-white">{monthlySalesData.find((row) => row.isMax)?.label}</span> achieving <span className="font-bold text-white">{formatCurrency(monthlySalesData.find((row) => row.isMax)?.sales || 0)}</span>.
                                </p>
                              </div>
                            )}
                          </ChartShell>
                        </div>
                      </div>
                    </div>
                  )}

                  {activeTab === 'analytics' && (
                    <div className="flex flex-col lg:flex-row gap-6">
                      <div className="flex-1 bg-slate-900 rounded-xl border border-slate-800 shadow-md overflow-hidden flex flex-col">
                        <div className="bg-slate-800 p-5 border-b border-slate-700 flex justify-between items-center">
                          <h3 className="font-black text-white uppercase tracking-widest text-lg flex items-center gap-2">
                            {FileText && <FileText className="text-emerald-500" />}
                            Financial Summary
                          </h3>
                        </div>
                        <div className="p-5 flex-1">
                          <table className="w-full text-left border-collapse border border-slate-700">
                            <tbody className="divide-y divide-slate-700">
                              <tr className="hover:bg-slate-800/50 transition-colors"><td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/30 w-12 text-center">1</td><td className="p-4 text-sm font-bold text-slate-300">Start Date</td><td className="p-4 text-sm font-bold text-slate-300 text-right font-mono">{formatDisplayDate(stats.startDate)}</td></tr>
                              <tr className="hover:bg-slate-800/50 transition-colors"><td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/30 text-center">2</td><td className="p-4 text-sm font-bold text-slate-300">End Date</td><td className="p-4 text-sm font-bold text-slate-300 text-right font-mono">{formatDisplayDate(stats.endDate)}</td></tr>
                              <tr className="hover:bg-slate-800/50 transition-colors"><td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/30 text-center">3</td><td className="p-4 text-sm font-bold text-slate-300">Total Number of Matches</td><td className="p-4 text-sm font-bold text-slate-300 text-right text-white">{stats.totalMatches}</td></tr>
                              <tr className="hover:bg-slate-800/50 transition-colors"><td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/30 text-center">4</td><td className="p-4 text-sm font-bold text-slate-300">Total Revenue</td><td className="p-4 text-sm font-black text-slate-300 text-right text-emerald-400">{formatCurrency(stats.totalRevenue)}</td></tr>
                              <tr className="hover:bg-slate-800/50 transition-colors"><td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/30 text-center">5</td><td className="p-4 text-sm font-bold text-slate-300">Total Expenses</td><td className="p-4 text-sm font-black text-slate-300 text-right text-red-400">{formatCurrency(stats.totalExpenses)}</td></tr>
                              <tr className="hover:bg-slate-800/50 transition-colors bg-slate-800/40">
                                <td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/50 text-center">6</td>
                                <td className="p-4 text-sm font-black text-white">Net Profit <span className="font-normal text-slate-400 text-xs ml-1">(Revenue - Expenses)</span></td>
                                <td className={`p-4 text-base font-black text-right ${stats.netProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{formatCurrency(stats.netProfit)}</td>
                              </tr>
                              <tr className="hover:bg-slate-800/50 transition-colors"><td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/30 text-center">7</td><td className="p-4 text-sm font-bold text-slate-300">Asset / Inventory (Purchase)</td><td className="p-4 text-sm font-black text-slate-300 text-right text-blue-400">{formatCurrency(stats.totalAsset)}</td></tr>
                              <tr className="hover:bg-slate-800/50 transition-colors"><td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/30 text-center">8</td><td className="p-4 text-sm font-bold text-slate-300">Period Net Cash Flow <span className="font-medium text-slate-500 text-xs ml-1">(Profit - Assets)</span></td><td className={`p-4 text-sm font-black text-right ${stats.netCashFlow >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{formatCurrency(stats.netCashFlow)}</td></tr>
                              <tr className="hover:bg-slate-800/50 transition-colors"><td className="p-4 text-sm font-bold text-slate-400 bg-slate-800/30 text-center">9</td><td className="p-4 text-sm font-bold text-slate-300">Opening Treasury Balance <span className="font-medium text-slate-500 text-xs ml-1">(Rollover)</span></td><td className="p-4 text-sm font-black text-slate-300 text-right text-slate-400">{formatCurrency(stats.prevBalance)}</td></tr>
                              <tr className="hover:bg-slate-800/50 transition-colors bg-emerald-900/20 border-t-2 border-emerald-500/50">
                                <td className="p-4 text-sm font-bold text-emerald-500 bg-emerald-900/30 text-center">10</td>
                                <td className="p-4 text-sm font-black text-emerald-400">Closing Treasury Balance <span className="font-bold text-emerald-500/70 text-xs ml-1">(Opening + Cash Flow)</span></td>
                                <td className="p-4 text-lg font-black text-right text-emerald-400 drop-shadow-md">{formatCurrency(stats.currentBalance)}</td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  )}

                  {activeTab === 'entry' && (
                    <div className="max-w-3xl mx-auto">
                      <div className="bg-slate-900 rounded-xl border border-slate-800 shadow-lg overflow-hidden">
                        <div className="flex border-b border-slate-800">
                          {['booking', 'expense', 'inventory'].map((type) => (
                            <button key={type} onClick={() => { setEntryType(type); setFormData(prev => ({...prev, amount: type === 'booking' ? 2000 : '', description: '', matches: 1})); }} className={`flex-1 py-4 text-xs font-bold uppercase tracking-widest transition-all ${entryType === type ? 'bg-emerald-500/10 text-emerald-400 border-b-2 border-emerald-500' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>{type}</button>
                          ))}
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 sm:p-8 space-y-6">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                              <label className={themeLabel}>Target Date</label>
                              <input type="date" name="date" required className={themeInput} value={formData.date} onChange={handleInputChange} />
                            </div>
                            <div>
                              <label className={themeLabel}>Calculated Day</label>
                              <input type="text" readOnly className={`${themeInput} bg-slate-950/50 text-slate-500 cursor-not-allowed`} value={getDayName(formData.date)} />
                            </div>
                            {entryType === 'booking' && (
                              <>
                                <div>
                                  <label className={themeLabel}>Match Count</label>
                                  <input type="number" name="matches" min="1" required className={themeInput} value={formData.matches} onChange={handleInputChange} />
                                </div>
                                <div>
                                  <label className={themeLabel}>Total Amount (Manual Override)</label>
                                  <div className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">৳</span>
                                    <input type="number" name="amount" required className={`${themeInput} pl-8`} value={formData.amount} onChange={handleInputChange} />
                                  </div>
                                </div>
                              </>
                            )}
                            {(entryType === 'expense' || entryType === 'inventory') && (
                              <>
                                <div className="md:col-span-2">
                                  <label className={themeLabel}>Particulars / Description</label>
                                  <input type="text" name="description" required placeholder="Enter detailed description..." className={themeInput} value={formData.description} onChange={handleInputChange} />
                                </div>
                                <div className="md:col-span-2">
                                  <label className={themeLabel}>Expense Amount</label>
                                  <div className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">৳</span>
                                    <input type="number" name="amount" required className={`${themeInput} pl-8`} value={formData.amount} onChange={handleInputChange} />
                                  </div>
                                </div>
                              </>
                            )}
                          </div>
                          <div className="pt-6 border-t border-slate-800">
                            <button type="submit" disabled={isSaving} className={`w-full py-4 font-black tracking-widest uppercase rounded-lg flex justify-center items-center gap-2 transition-all hover:scale-[1.01] shadow-md ${isSaving ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-500 text-white'}`}>
                              {isSaving ? (Loader2 ? <Loader2 className="animate-spin" size={18} /> : null) : (Save ? <Save size={18} /> : null)}
                              {isSaving ? 'UPDATING PLAYBOOK...' : 'Log Entry'}
                            </button>
                          </div>
                        </form>
                      </div>
                    </div>
                  )}

                  {activeTab === 'records' && (
                    <div className="space-y-8">
                      <div className="bg-slate-900 rounded-xl border border-slate-800 shadow-md overflow-hidden">
                        <div className="bg-slate-800 p-5 border-b border-slate-700">
                          <h3 className="font-black text-white uppercase tracking-widest flex items-center gap-2">
                            {List && <List className="text-emerald-500" />}
                            Revenue Ledger
                          </h3>
                        </div>
                        <div className="overflow-x-auto">
                          <table className="w-full text-left border-collapse">
                            <thead>
                              <tr className="bg-slate-900/50 border-b border-slate-700 text-xs text-slate-400 uppercase tracking-widest">
                                <th className="p-4 font-bold">Date</th><th className="p-4 font-bold">Day</th><th className="p-4 font-bold text-center">Matches</th><th className="p-4 font-bold text-right">Amount</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800/50 text-sm">
                              {filteredData.bookings.length > 0 ? filteredData.bookings.map((row) => (
                                <tr key={row.id} className="hover:bg-slate-800/30 transition-colors">
                                  <td className="p-4 font-bold text-white">{formatDisplayDate(row.date)}</td><td className="p-4 font-medium text-slate-400">{row.day}</td><td className="p-4 text-center font-bold text-slate-300">{row.matches}</td><td className="p-4 text-right text-emerald-400 font-black">{formatCurrency(row.amount)}</td>
                                </tr>
                              )) : <tr><td colSpan="4" className="p-6 text-center text-slate-500 font-medium">No data found</td></tr>}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
